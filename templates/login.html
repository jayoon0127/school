{% extends 'base.html' %}
{% block title %}로그인{% endblock %}
{% block content %}
<div class="card" style="max-width:520px;margin:30px auto;">
  <h2>로그인</h2>
  
  <form method="post">
    {{ form.hidden_tag() }}
    <label>아이디 {{ form.username(class_='field') }}</label>
    <label>비밀번호 {{ form.password(class_='field') }}</label>
    {{ form.submit(class_='btn primary') }}
  </form>
</div>
{% endblock %}
