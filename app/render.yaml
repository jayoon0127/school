services:
  - type: web
    name: school-board-web
    runtime: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
    startCommand: gunicorn run:app
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: TRUST_PROXY
        value: "1"
      - key: MAX_CONTENT_LENGTH
        value: "10485760"
      - key: UPLOAD_DIR
        value: /opt/render/project/src/app/static/uploads
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: school-board-db
          property: connectionString

databases:
  - name: school-board-db
    plan: free
    databaseName: school_board
    user: school_user